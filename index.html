<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=kamijoro.html">
    <title>Redirecting to Warung Kamijoro...</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f9f9f9;
        }
        .redirect {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e67e22;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #e67e22;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect">
        <div class="spinner"></div>
        <p>Mengarahkan ke <strong>Warung Kamijoro</strong>...</p>
        <p>Jika tidak otomatis redirect, <a href="kamijoro.html">klik di sini</a></p>
    </div>
    
    <script>
        // Redirect otomatis ke kamijoro.html
        setTimeout(() => {
            window.location.href = "kamijoro.html";
        }, 100);
    </script>
</body>
</html>
